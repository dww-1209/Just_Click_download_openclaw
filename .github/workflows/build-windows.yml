name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx psutil "pyinstaller>=6.11.0,<6.12.0" "pyside6>=6.8.0,<6.9.0"

      - name: Build executables
        env:
          PYTHONIOENCODING: utf-8
        run: python build.py

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Installer-Windows-${{ github.run_id }}
          path: dist/*.exe
          retention-days: 90

      - name: Upload full dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Dist-Full-${{ github.run_id }}
          path: dist/**/**
          retention-days: 90
